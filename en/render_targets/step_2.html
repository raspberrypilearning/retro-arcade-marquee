<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Step 2 preview</title>
  <link rel="stylesheet" href="../en/code/retro-arcade-marquee-starter/style.css">
  <style>
    .marquee {
      width: 100%;
      overflow: hidden;
    }

    .marquee-text {
      display: inline-block;
      min-width: max-content;
      margin: 0;
      white-space: nowrap;
      animation: scroll-left 11s linear infinite;
    }

    @keyframes scroll-left {
      from {
        transform: translateX(100%);
      }

      to {
        transform: translateX(-100%);
      }
    }
  </style>
  <script src="../en/code/retro-arcade-marquee-starter/arcade-helper.js" defer></script>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <p class="eyebrow">&#9733; CODE CLUB ARCADE &#9733;</p>
      <h1>Retro Arcade Marquee</h1>
      <p class="tagline">Invent the loudest arcade advert on the web.</p>
    </header>

    <main>
      <section class="attract-screen" aria-label="Automatic arcade demo">
        <div class="screen-bar">AUTO DEMO // NO JOYSTICK NEEDED</div>
        <div id="arcade-demo" class="arcade-demo" aria-hidden="true"></div>
      </section>

      <section class="promo-zone" aria-labelledby="promo-title">
        <h2 id="promo-title">Your game advert</h2>
        <div class="marquee" aria-label="Scrolling arcade advert">
          <p class="marquee-text">NOW PLAYING: LASER HAMSTER XTREME</p>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
