<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Retro Arcade Marquee</title>
  <link rel="stylesheet" href="style.css">
  <script src="arcade-helper.js" defer></script>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <p class="eyebrow">&#9733; CODE CLUB ARCADE &#9733;</p>
      <h1>Retro Arcade Marquee</h1>
      <p class="tagline">Invent the loudest arcade advert on the web.</p>
    </header>

    <main>
      <section class="attract-screen" aria-label="Automatic arcade demo">
        <div class="screen-bar">AUTO DEMO // NO JOYSTICK NEEDED</div>
        <div id="arcade-demo" class="arcade-demo" aria-hidden="true"></div>
      </section>

      <section class="promo-zone" aria-labelledby="promo-title">
        <h2 id="promo-title">Your game advert</h2>
        <!-- Build your scrolling arcade advert inside this section. -->
      </section>
    </main>
  </div>
</body>
</html>
